<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Tiempos — Carreras</title>
    <link rel="stylesheet" href="ranking.css">
</head>

<body>

    <div class="container">

        <header>
            <div class="header-left">
                <h1>Ranking de <span>Tiempos</span></h1>
                <p>Mejores registros en carrera</p>
            </div>
            <div class="header-right">
                <div id="userSection">
                    <button class="btn-auth" onclick="openModal()">Registrar / Entrar</button>
                </div>
                <div class="stats-badge" id="stats">Cargando...</div>
            </div>
        </header>

        <!-- Modal de Autenticación -->
        <div id="authModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
                    <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
                </div>
                
                <form id="authForm" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" required placeholder="Tu nombre de piloto">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required placeholder="******">
                    </div>
                    <button type="submit" id="submitBtn" class="btn-primary">Entrar</button>
                    <p id="authMessage" class="auth-message"></p>
                </form>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="searchInput">Buscar piloto</label>
                <input type="text" id="searchInput" placeholder="Nombre del piloto...">
            </div>
            <div class="control-group">
                <label for="filterMap">Mapa</label>
                <select id="filterMap">
                    <option value="">Todos los mapas</option>
                </select>
            </div>
            <div class="control-group">
                <label for="filterCar">Coche</label>
                <select id="filterCar">
                    <option value="">Todos los coches</option>
                </select>
            </div>
            <button class="btn-reset" onclick="resetFilters()">Limpiar filtros</button>
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Ranking Global</th>
                        <th>Piloto</th>
                        <th>Mejor vuelta</th>
                        <th>Tiempo total</th>
                        <th>Coche</th>
                        <th>Mapa</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="state-row loading">
                        <td colspan="7">Cargando tiempos...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="ranking.js"></script>
</body>

</html>
